<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 17th Birthday My Love 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3e0);
    text-align:center;
    color:white;
}

/* Card */
.card{
    width:90%;
    max-width:420px;
    padding:30px 25px;
    border-radius:30px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
    box-shadow:0 0 40px rgba(255,255,255,0.4);
    animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

h1{
    font-size:26px;
    margin-bottom:15px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #fff;}
    to{text-shadow:0 0 30px #ff1a75;}
}

/* Typing Effect */
.message{
    font-size:16px;
    line-height:1.6;
    min-height:120px;
    white-space:pre-line;
    border-right:2px solid white;
    overflow:hidden;
}

/* Floating Hearts */
.heart{
    position:absolute;
    width:20px;
    height:20px;
    background:red;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}

.heart::before,
.heart::after{
    content:'';
    width:20px;
    height:20px;
    background:inherit;
    border-radius:50%;
    position:absolute;
}

.heart::before{ top:-10px; left:0; }
.heart::after{ left:-10px; top:0; }

@keyframes float{
    0%{ bottom:-10%; opacity:1;}
    100%{ bottom:110%; opacity:0;}
}

/* Confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    animation: fall 5s linear infinite;
}

@keyframes fall{
    0%{ top:-10%; transform:rotate(0deg);}
    100%{ top:110%; transform:rotate(360deg);}
}

footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.9;
}
</style>
</head>

<body>

<div class="card">
    <h1>Happy 17th Birthday My Beautiful Wife 💕</h1>

    <div class="message" id="typedText"></div>

    <footer>Forever Yours Anshuuu ❤️</footer>
</div>

<script>

/* ===================================
   💌 EDIT MESSAGE HERE ONLY
=================================== */

const message = `
My Love 💖

On your 17th birthday,
I just want to say you are my greatest blessing.
Your smile is my sunshine ☀️
Your love is my strength 💕

May your life always be filled with happiness,
success, and endless love.

I love you more than yesterday,
but less than tomorrow ❤️
`;

/* =================================== */


/* Typing Animation */
let i = 0;
function typeWriter(){
    if(i < message.length){
        document.getElementById("typedText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}
typeWriter();

/* Floating Hearts */
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*3+3)+"s";
    heart.style.background = ["#ff1a75","#ff4da6","#ff99cc"][Math.floor(Math.random()*3)];
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,500);

/* Confetti */
function createConfetti(){
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random()*100 + "vw";
    confetti.style.background = ["yellow","white","pink","#ff66b2"][Math.floor(Math.random()*4)];
    confetti.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(),5000);
}
setInterval(createConfetti,300);

</script>

</body>
</html>
